<div class="container mx-auto p-4 max-w-7xl">
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="bg-white p-6 rounded shadow-md space-y-4"
  >
    <!-- Textarea -->
    <mat-form-field class="w-full">
      <mat-label>Message</mat-label>
      <textarea
        matInput
        formControlName="message"
        rows="10"
        class="w-full border p-2"
        maxlength="4096"
        placeholder="Enter your message (max 4096 bytes)"
      ></textarea>
      <mat-hint align="end">{{ messageLength }} / 4096 bytes</mat-hint>
      <mat-error *ngIf="form.get('message')?.hasError('required')">
        Message is required.
      </mat-error>
    </mat-form-field>

    <!-- Optional Password -->
    <mat-form-field class="w-full">
      <mat-label>Password (optional)</mat-label>
      <input
        matInput
        type="password"
        formControlName="password"
        placeholder="Enter a password (optional)"
        class="w-full border p-2"
      />
    </mat-form-field>

    <!-- Submit Button -->
    <button
      mat-raised-button
      color="primary"
      [disabled]="form.invalid"
      class="w-full"
      #btn
    >
      Submit
    </button>
  </form>
</div>

@if (encryptedInput$ | async; as encryptedInput) {
  <div class="container justify-center mx-auto p-4 flex">
    <button
      mat-button
      routerLink="/public/read-secret"
      [queryParams]="{ encryptedInput: encryptedInput }"
    >
      Link to Secret <mat-icon>link</mat-icon>
    </button>
    <button mat-icon-button>
      <mat-icon color="primary" style="font-size: 18px" (click)="copyToClipboard()">content_copy</mat-icon>
    </button>
  </div>
}
