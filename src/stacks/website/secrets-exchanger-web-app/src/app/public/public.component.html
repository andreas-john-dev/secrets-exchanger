<div class="flex flex-col min-h-screen">
  <header class="bg-ink-900 text-white shadow-lg">
    <div class="container mx-auto max-w-6xl px-4 sm:px-6 h-16 flex items-center justify-between">
      <a routerLink="/public" class="flex items-center gap-3 group">
        <span
          class="grid place-items-center w-9 h-9 rounded-md bg-brand-500/15 ring-1 ring-brand-400/30 text-brand-300 group-hover:bg-brand-500/25 transition">
          <mat-icon fontIcon="lock_outline" class="!w-5 !h-5 !text-[20px]"></mat-icon>
        </span>
        <span class="flex flex-col leading-tight">
          <span class="text-[15px] font-semibold tracking-tight">Secrets Exchanger</span>
          <span class="text-[11px] text-slate-400 uppercase tracking-[0.18em]">Encrypted Single-Use Links</span>
        </span>
      </a>

      <nav class="flex items-center gap-1">
        <a mat-button class="!text-white" routerLink="/public/create-secret" routerLinkActive="nav-active">
          <mat-icon fontIcon="lock"></mat-icon>
          <span class="hidden sm:inline ml-1">Create</span>
        </a>
        <a mat-button class="!text-white" routerLink="/public/read-secret" routerLinkActive="nav-active">
          <mat-icon fontIcon="lock_open"></mat-icon>
          <span class="hidden sm:inline ml-1">Read</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>

  <footer class="border-t border-ink-300/60 bg-white/40">
    <div
      class="container mx-auto max-w-6xl px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-ink-500">
      <span>© {{ currentYear }} Secrets Exchanger</span>
      <span class="flex items-center gap-1">
        <mat-icon fontIcon="shield" class="!w-4 !h-4 !text-[16px]"></mat-icon>
        Encrypted with AWS KMS · Stored briefly, then destroyed
      </span>
    </div>
  </footer>
</div>
