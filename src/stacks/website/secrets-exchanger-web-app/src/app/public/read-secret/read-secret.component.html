<div class="container mx-auto p-4 max-w-7xl">
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="bg-white p-6 rounded shadow-md space-y-4"
  >
    <mat-form-field class="w-full">
      <mat-label>Encrypted Input</mat-label>
      <input
        matInput
        type="text"
        formControlName="encryptedInput"
        placeholder="Enter encrypted input"
        class="w-full border p-2"
      />
    </mat-form-field>
    <mat-form-field class="w-full">
      <mat-label>Password (optional)</mat-label>
      <input
        matInput
        type="password"
        formControlName="passphrase"
        placeholder="Enter a password (optional)"
        class="w-full border p-2"
      />
    </mat-form-field>
    
    <button
      mat-raised-button
      color="primary"
      [disabled]="form.invalid"
      class="w-full"
      #btn
    >
      Decrypt
    </button>
    <!-- Textarea -->
    <mat-form-field class="w-full">
        <mat-label>Decrypted Message</mat-label>
        <textarea
          matInput
          rows="10"
          class="w-full border p-2"
          maxlength="4096"
          readonly
          formControlName="message"
          >{{form.get('message')}}</textarea
        >
      </mat-form-field>
  </form>
</div>
